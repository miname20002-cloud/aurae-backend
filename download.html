<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurae 다운로드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0b14;
    --card: #15141f;
    --card-border: #232233;
    --accent: #8b7cf6;
    --accent-soft: rgba(139, 124, 246, 0.35);
    --text: #f1efff;
    --text-dim: #9c97b8;
    --teal: #5fae96;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* ambient aurora glow - the one signature element, kept subtle */
  body::before {
    content: "";
    position: absolute;
    top: -20%;
    left: 50%;
    width: 600px;
    height: 600px;
    transform: translateX(-50%);
    background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
    filter: blur(40px);
    animation: drift 8s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes drift {
    from { opacity: 0.5; transform: translateX(-50%) translateY(0); }
    to   { opacity: 0.85; transform: translateX(-50%) translateY(20px); }
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 380px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 36px 28px 32px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .wordmark {
    font-family: 'Fredoka', sans-serif;
    font-size: 30px;
    font-weight: 600;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, #ffffff, var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 0;
  }

  .tagline {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    margin: 4px 0 28px;
    text-transform: lowercase;
  }

  .qr-frame {
    width: 220px;
    height: 220px;
    margin: 0 auto 22px;
    padding: 14px;
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 0 0 1px var(--card-border), 0 0 40px var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .qr-frame svg, .qr-frame canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
  }

  .instructions {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .download-btn {
    display: inline-block;
    width: 100%;
    padding: 14px 0;
    background: var(--accent);
    color: #0b0b14;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 16px;
    text-decoration: none;
    border-radius: 14px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .download-btn:active {
    transform: scale(0.98);
  }

  .meta {
    margin-top: 22px;
    font-size: 12px;
    color: var(--text-dim);
    border-top: 1px solid var(--card-border);
    padding-top: 16px;
  }

  .meta .build-id {
    color: var(--teal);
    font-family: monospace;
  }

  .footer-note {
    margin-top: 18px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.7;
    line-height: 1.5;
  }

  .beta-note {
    margin-top: 14px;
    padding: 12px 14px;
    background: rgba(139, 124, 246, 0.08);
    border: 1px solid var(--accent-soft);
    border-radius: 12px;
    font-size: 11.5px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .beta-note strong {
    color: var(--accent);
    font-weight: 600;
  }

  .beta-note a {
    color: var(--teal);
    text-decoration: none;
    font-weight: 600;
  }

  .beta-note a:active {
    opacity: 0.7;
  }

  .footer-note .warn {
    color: #FFB84D;
    font-weight: 700;
  }

  @media (prefers-reduced-motion: reduce) {
    body::before { animation: none; }
  }
</style>
</head>
